version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/ghost
    binary: ghost
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

homebrew_casks:
  - name: ghost
    repository:
      owner: rcliao
      name: homebrew-tap
    homepage: https://github.com/rcliao/ghost
    description: Persistent memory system for AI agents. Single binary, SQLite-backed.

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
